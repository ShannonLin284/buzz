<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- Favicon (tab / search bar icon) -->
    <link
      rel="icon"
      type="image/png"
      href="%PUBLIC_URL%/buzz-logo-no-bee.png"
    />

    <!-- Mobile + scaling -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Theme color (mobile browser bar) -->
    <meta name="theme-color" content="#ff5a6f" />

    <!-- SEO -->
    <meta
      name="description"
      content="BUZZ connects brands with campus communities through authentic student representatives."
    />

    <script type="text/javascript">
      // Rehydrate routes redirected by `public/404.html` before React Router mounts.
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash,
          );
        }
      })(window.location);
    </script>

    <!-- Title -->
    <title>BUZZ</title>

  </head>

  <body>
    <!-- React mounts here -->
    <div id="root"></div>

    <!-- If JavaScript is disabled -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
  </body>
</html>
