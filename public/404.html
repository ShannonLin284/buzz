<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>BUZZ</title>
    <script type="text/javascript">
      // Redirect unknown GitHub Pages routes to index with encoded path/query.
      // pathSegmentsToKeep = 0 for custom domains served from site root.
      var pathSegmentsToKeep = 0;

      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
